# Local dev stack for distributed-consistency-lab.
# RabbitMQ (broker) + PostgreSQL (one instance, schema-per-service) + the 3 services.
# The integration test suite does NOT use this file — it spins its own throwaway
# containers via Testcontainers so it can kill/restart the broker mid-flow.

services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: dcl-rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # management UI (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17-alpine
    container_name: dcl-postgres
    environment:
      POSTGRES_USER: dcl
      POSTGRES_PASSWORD: dcl
      POSTGRES_DB: dcl
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcl"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  orders:
    build:
      context: ..
      dockerfile: src/Services/Orders/Dockerfile
    container_name: dcl-orders
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Database=dcl;Username=dcl;Password=dcl"
      RabbitMq__Host: "rabbitmq"
    ports:
      - "8080:8080"

  inventory:
    build:
      context: ..
      dockerfile: src/Services/Inventory/Dockerfile
    container_name: dcl-inventory
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Database=dcl;Username=dcl;Password=dcl"
      RabbitMq__Host: "rabbitmq"

  payments:
    build:
      context: ..
      dockerfile: src/Services/Payments/Dockerfile
    container_name: dcl-payments
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Database=dcl;Username=dcl;Password=dcl"
      RabbitMq__Host: "rabbitmq"

volumes:
  pgdata:
